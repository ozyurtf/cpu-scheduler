<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPU Scheduler Visualizer</title>
    <style>
        :root {
            --bg2: #f8fafc;
            --b: #cbd5e1;
            --s: #64748b;
            --t: #94a3b8;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            --color-text-primary: #1e293b;
            --color-text-secondary: #475569;
            --color-background-primary: #ffffff;
            --color-background-secondary: #f1f5f9;
            --color-border-tertiary: #e2e8f0;
            --border-radius-md: 6px;
        }

        body {
            background-color: var(--color-background-primary);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            max-width: 820px;
            width: 100%;
        }

        @keyframes pulse {
            0%, 100% { opacity: .55 }
            50% { opacity: 1 }
        }

        @keyframes busflow {
            to { stroke-dashoffset: -16 }
        }

        @keyframes spin {
            to { transform: rotate(360deg) }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(.9) }
            to   { opacity: 1; transform: scale(1) }
        }

        .act  { animation: pulse 1s ease-in-out infinite }
        .bus  { stroke-dasharray: 6 6; animation: busflow .7s linear infinite }
        .dsk  { animation: spin 1.8s linear infinite; transform-origin: center; transform-box: fill-box; }
        .pchip{ animation: fadeIn .25s ease-out; filter: drop-shadow(0 2px 3px rgba(0,0,0,.1)) }

        button {
            font-family: var(--font-sans);
            padding: 4px 12px;
            border: 1px solid var(--b);
            background: #fff;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: var(--color-text-primary);
        }
        button:hover { background: var(--bg2) }
        button:disabled { opacity: .5; cursor: not-allowed }

        select, input[type=text] {
            font-family: var(--font-sans);
            padding: 4px 6px;
            border: 1px solid var(--b);
            border-radius: 4px;
            color: var(--color-text-primary);
        }
    </style>
</head>

<body>
<div class="app-container">
<div style="padding:.5rem 0;font-family:var(--font-sans);color:var(--color-text-primary);">

    <!-- Controls -->
    <style>
        .ctrl-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 1.5rem;
            background: var(--color-background-primary);
            padding: 14px 16px;
            border: 1px solid var(--color-border-tertiary);
            border-radius: var(--border-radius-md);
            filter: drop-shadow(0 2px 5px rgba(0,0,0,.03));
        }
        .ctrl-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--color-text-secondary);
            letter-spacing: .04em;
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        /* File picker pills */
        .file-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
        }
        .file-btn {
            padding: 5px 4px;
            border: 1px solid var(--b);
            background: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--color-text-secondary);
            text-align: center;
            transition: background .12s, border-color .12s, color .12s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .file-btn:hover { background: var(--bg2); color: var(--color-text-primary); border-color: #94a3b8; }
        .file-btn.active {
            background: #EEEDFE;
            border-color: #534AB7;
            color: #3C3489;
            font-weight: 700;
        }
        /* Algorithm pills */
        .algo-section { display: flex; flex-direction: column; gap: 6px; }
        .algo-row { display: flex; gap: 5px; flex-wrap: wrap; }
        .algo-btn {
            padding: 5px 10px;
            border: 1px solid var(--b);
            background: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--color-text-secondary);
            transition: background .12s, border-color .12s, color .12s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
            min-width: 46px;
        }
        .algo-btn .algo-code { font-weight: 700; font-size: 12px; color: var(--color-text-primary); }
        .algo-btn .algo-name { font-size: 8.5px; opacity: .65; font-family: var(--font-sans); }
        .algo-btn:hover { background: var(--bg2); border-color: #94a3b8; }
        .algo-btn.active {
            background: #EEEDFE;
            border-color: #534AB7;
        }
        .algo-btn.active .algo-code { color: #3C3489; }
        /* RR quantum selector */
        .rr-q-wrap { display: flex; align-items: center; gap: 5px; margin-left: 4px; }
        .rr-q-wrap label { font-size: 10px; color: var(--color-text-secondary); font-weight: 600; }
        .rr-q-wrap select {
            font-size: 11px; font-family: var(--font-mono);
            padding: 3px 5px; border: 1px solid var(--b); border-radius: 4px;
            color: var(--color-text-primary); background: #fff;
        }
        /* Bottom bar: run controls + clock */
        .ctrl-bottom {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-top: 10px;
            border-top: 1px solid var(--color-border-tertiary);
        }
    </style>

    <div class="ctrl-panel">
        <!-- LEFT: Input File -->
        <div>
            <div class="ctrl-label">Input File</div>
            <div class="file-grid" id="fileGrid">
                <button class="file-btn active" data-val="input0" onclick="selectFile(this)">Input 0<br><span style="font-size:9px;font-family:var(--font-sans);opacity:.6">Simple</span></button>
                <button class="file-btn" data-val="input1" onclick="selectFile(this)">Input 1</button>
                <button class="file-btn" data-val="input2" onclick="selectFile(this)">Input 2</button>
                <button class="file-btn" data-val="input3" onclick="selectFile(this)">Input 3</button>
                <button class="file-btn" data-val="input4" onclick="selectFile(this)">Input 4</button>
                <button class="file-btn" data-val="input5" onclick="selectFile(this)">Input 5</button>
                <button class="file-btn" data-val="input6" onclick="selectFile(this)">Input 6<br><span style="font-size:9px;font-family:var(--font-sans);opacity:.6">Complex</span></button>
                <button class="file-btn" data-val="input7" onclick="selectFile(this)">Input 7<br><span style="font-size:9px;font-family:var(--font-sans);opacity:.6">Large</span></button>
                <button class="file-btn" data-val="input8" onclick="selectFile(this)">Input 8</button>
            </div>
            <!-- hidden value holder -->
            <input type="hidden" id="inpFile" value="input0">
        </div>

        <!-- RIGHT: Algorithm -->
        <div class="algo-section">
            <div class="ctrl-label">Scheduling Algorithm</div>
            <div class="algo-row">
                <button class="algo-btn active" data-algo="F" onclick="selectAlgo(this,'F')">
                    <span class="algo-code">F</span><span class="algo-name">FCFS</span>
                </button>
                <button class="algo-btn" data-algo="L" onclick="selectAlgo(this,'L')">
                    <span class="algo-code">L</span><span class="algo-name">LCFS</span>
                </button>
                <button class="algo-btn" data-algo="S" onclick="selectAlgo(this,'S')">
                    <span class="algo-code">S</span><span class="algo-name">SRTF</span>
                </button>
                <button class="algo-btn" data-algo="R" onclick="selectAlgo(this,'R')">
                    <span class="algo-code">R</span><span class="algo-name">Round Robin</span>
                </button>
                <button class="algo-btn" data-algo="P" onclick="selectAlgo(this,'P')">
                    <span class="algo-code">P</span><span class="algo-name">Priority</span>
                </button>
                <button class="algo-btn" data-algo="E" onclick="selectAlgo(this,'E')">
                    <span class="algo-code">E</span><span class="algo-name">PrePrio</span>
                </button>
            </div>
            <!-- Quantum selector — shown only for R and P -->
            <div class="rr-q-wrap" id="qWrap" style="display:none;">
                <label>Quantum:</label>
                <select id="quantumSel" onchange="updateAlgoFromQuantum()">
                    <option value="1">1</option>
                    <option value="2" selected>2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="8">8</option>
                    <option value="10">10</option>
                    <option value="16">16</option>
                    <option value="32">32</option>
                </select>
            </div>
            <!-- Hidden value used by fetchTrace -->
            <input type="hidden" id="inpAlgo" value="F">
        </div>

        <!-- BOTTOM: Run controls + clock -->
        <div class="ctrl-bottom">
            <button onclick="fetchTrace()" id="btnLoad" style="background:#534AB7;color:#fff;border:none;font-weight:600;padding:6px 16px;font-size:13px;">▶ Simulate</button>
            <div style="width:1px;height:22px;background:var(--b);margin:0 4px;"></div>
            <button onclick="stepForward()" id="btnStep" disabled>Step</button>
            <button id="bp" onclick="togglePlay()" disabled>Play</button>
            <button onclick="resetSim()" id="btnReset" disabled>Reset</button>
            <div style="width:1px;height:22px;background:var(--b);margin:0 4px;"></div>
            <label style="font-size:10px;font-weight:700;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;">Speed</label>
            <input type="range" id="speed" min="50" max="1500" value="600" style="direction:rtl;width:72px;">
            <div style="margin-left:auto;font-size:12px;color:var(--color-text-secondary);">
                <span id="algoLabel" style="font-weight:bold;color:var(--color-text-primary);">-</span>
                &nbsp;&nbsp;|&nbsp;&nbsp;
                Clock: <span id="clk" style="font-weight:600;font-size:18px;color:#0F6E56;">0</span>
            </div>
        </div>
    </div>

    <script>
        // ── File pill selection
        function selectFile(btn) {
            document.querySelectorAll('.file-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('inpFile').value = btn.dataset.val;
        }

        // ── Algorithm pill selection
        let _baseAlgo = 'F';
        function selectAlgo(btn, algo) {
            document.querySelectorAll('.algo-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            _baseAlgo = algo;
            const needsQ = (algo === 'R' || algo === 'P' || algo === 'E');
            document.getElementById('qWrap').style.display = needsQ ? 'flex' : 'none';
            updateAlgoFromQuantum();
        }
        function updateAlgoFromQuantum() {
            const needsQ = (_baseAlgo === 'R' || _baseAlgo === 'P' || _baseAlgo === 'E');
            const q = document.getElementById('quantumSel').value;
            document.getElementById('inpAlgo').value = needsQ ? _baseAlgo + q : _baseAlgo;
        }
    </script>

    <!-- Event log -->

<script>
    const C  = ['#7F77DD','#1D9E75','#D85A30','#D4537E','#378ADD','#639922','#C49B07','#A855F7','#EF4444','#14B8A6'];
    const CL = ['#EEEDFE','#E1F5EE','#FAECE7','#FBEAF0','#E6F1FB','#EAF3DE','#FEF9C3','#F3E8FF','#FEE2E2','#CCFBF1'];
    const CT = ['#3C3489','#085041','#712B13','#72243E','#0C447C','#27500A','#713F12','#4C1D95','#7F1D1D','#0F766E'];

    const STATE_COLOR = { READY:'#534AB7', RUNNG:'#0F6E56', BLOCK:'#D85A30', Done:'#64748b', CREATED:'#94a3b8' };

    let parsedEvents = [];
    let gantt        = [];
    let logs         = [];
    let P            = [];
    let RQ           = [];
    let cpu          = null;
    let ioActive     = [];
    let time         = 0;
    let maxTime      = 0;
    let playing      = false;
    let timer        = null;
    let done         = false;
    let currentEventIndex = 0;
    let currentAlgo  = 'F';
    let algoFull     = '';
    let summaryStats = null;
    let ganttPage    = 0;
    let uspaceOffset = 0;
    let rqOffset     = 0;
    let prevRQ       = new Set();
    let prevCpu      = null;
    let prevIoActive = new Set();
    let prevArrived  = new Set();

    function ganttNav(d) {
        const maxPage = Math.max(0, Math.ceil(P.length / 8) - 1);
        ganttPage = Math.max(0, Math.min(ganttPage + d, maxPage));
        render();
    }
    function uspaceNav(d) {
        const arrived = P.filter(p => p.arrived);
        const maxOff = Math.max(0, arrived.length - 8);
        uspaceOffset = Math.max(0, Math.min(uspaceOffset + d * 8, maxOff));
        render();
    }
    function rqNav(d) {
        rqOffset = Math.max(0, Math.min(rqOffset + d, Math.max(0, RQ.length - 6)));
        render();
    }

    // ── R/W arm animation: full spin when idle, frozen when IO active
    let _armAngle = 0;
    function _armStep() {
        if (ioActive.length === 0) {
            _armAngle = (_armAngle + 1.2) % 360;
            const arm = document.getElementById('rw-arm');
            if (arm) arm.setAttribute('transform', `rotate(${_armAngle.toFixed(1)},70,65)`);
        }
        requestAnimationFrame(_armStep);
    }
    _armStep();

    // ──────────────────────────────────────────────── helpers
    function chip(pid, x, y, w, h, animate=false) {
        const ci = pid % C.length;
        const cls = animate ? 'pchip' : '';
        return `<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="3" fill="${C[ci]}"${cls ? ` class="${cls}"` : ''}/>` +
               `<text x="${x+w/2}" y="${y+h/2}" text-anchor="middle" dominant-baseline="central" fill="#fff" ` +
               `style="font-size:11px;font-weight:600;font-family:var(--font-sans)">P${pid}</text>`;
    }

    // ──────────────────────────────────────────────── fetch & parse
    async function fetchTrace() {
        logs = [];
        document.getElementById('log').innerHTML = '<div>Fetching trace from backend ./scheduler...</div>';
        document.getElementById('btnLoad').disabled = true;
        document.getElementById('btnLoad').textContent = 'Loading...';

        currentAlgo = document.getElementById('inpAlgo').value.trim() || 'F';
        const input = document.getElementById('inpFile').value || 'input0';

        try {
            const resp = await fetch('/run', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ algo: currentAlgo, input })
            });
            if (!resp.ok) throw new Error('Backend fault');
            const data = await resp.json();
            parseTrace(data.trace);
            document.getElementById('btnLoad').textContent = 'Simulate';
            document.getElementById('btnLoad').disabled = false;
        } catch (e) {
            document.getElementById('log').innerHTML =
                '<div style="color:#d4537e;font-weight:bold;">Error: Could not reach backend. Did you start server.py?</div>';
            document.getElementById('btnLoad').textContent = 'Simulate';
            document.getElementById('btnLoad').disabled = false;
        }
    }

    function parseTrace(text) {
        const lines = text.split('\n').map(l => l.replace(/\r$/, ''));
        parsedEvents = [];
        P = [];
        gantt = [];
        maxTime = 0;
        algoFull = '';
        summaryStats = null;
        document.getElementById('algoLabel').textContent = '-';

        const pMap = {};

        lines.forEach(line => {
            line = line.trim();
            if (!line) return;

            // verbose event line: "time pid dur: OLD -> NEW [extras]"
            const mEv = line.match(/^(\d+)\s+(\d+)\s+\d+:\s+([A-Z]+)\s+->\s+([A-Z]+)(.*)/);
            if (mEv) {
                const t   = parseInt(mEv[1]);
                const pid = parseInt(mEv[2]);
                const old = mEv[3];
                const nxt = mEv[4];
                const ext = mEv[5].trim();
                if (t > maxTime) maxTime = t;

                let cb   = ext.includes('cb=')   ? parseInt(ext.match(/cb=(\d+)/)[1])         : undefined;
                let rem  = ext.includes('rem=')  ? parseInt(ext.match(/rem=(\d+)/)[1])        : undefined;
                let prio = ext.includes('prio=') ? parseInt(ext.match(/prio=([-]?\d+)/)[1])   : undefined;
                let ib   = ext.includes('ib=')   ? parseInt(ext.match(/ib=(\d+)/)[1])         : undefined;

                if (!pMap[pid]) pMap[pid] = { pid, st:0, tc:0, tci:0, cpub:0, iob:0, prio:0,
                                               arrived:false, runStart:undefined, ioStart:undefined, finishTime:undefined };
                if (rem !== undefined && rem > pMap[pid].tci) pMap[pid].tci = rem;

                parsedEvents.push({ t, pid, old, nxt, cb, rem, prio, ib, text: line });
                return;
            }

            // Done line
            const mDone = line.match(/^(\d+)\s+(\d+)\s+\d+:\s+Done/);
            if (mDone) {
                const t   = parseInt(mDone[1]);
                const pid = parseInt(mDone[2]);
                if (t > maxTime) maxTime = t;
                if (!pMap[pid]) pMap[pid] = { pid, st:0, tc:0, tci:0, cpub:0, iob:0, prio:0,
                                               runStart:undefined, ioStart:undefined, finishTime:undefined };
                pMap[pid].finishTime = t;
                parsedEvents.push({ t, pid, old:'ANY', nxt:'Done', text: line });
                return;
            }

            // algorithm header
            const mAlgo = line.match(/^(FCFS|LCFS|SRTF|RR|PRIO|PREPRIO)(\s+\d+)?$/);
            if (mAlgo) {
                algoFull = line;
                document.getElementById('algoLabel').textContent = line;
                return;
            }

            // summary process line
            const mSum = line.match(/^(\d+):\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+(\d+)\s+\|\s+(\d+)/);
            if (mSum) {
                const pid    = parseInt(mSum[1]);
                const tcInit = parseInt(mSum[3]);
                const ft     = parseInt(mSum[7]);
                if (!pMap[pid]) pMap[pid] = { pid, st:0, tc:tcInit, tci:tcInit, cpub:0, iob:0, prio:0,
                                               runStart:undefined, ioStart:undefined, finishTime:ft };
                else {
                    if (tcInit > pMap[pid].tci) pMap[pid].tci = tcInit;
                    pMap[pid].finishTime = ft;
                }
                return;
            }

            // SUM line
            const mS = line.match(/^SUM:\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)\s+([\d.]+)/);
            if (mS) {
                summaryStats = {
                    simTime:    parseFloat(mS[1]),
                    cpuUtil:    parseFloat(mS[2]),
                    ioUtil:     parseFloat(mS[3]),
                    avgTAT:     parseFloat(mS[4]),
                    avgWait:    parseFloat(mS[5]),
                    throughput: parseFloat(mS[6])
                };
            }
        });

        if (summaryStats) maxTime = Math.max(maxTime, summaryStats.simTime);

        Object.values(pMap).forEach(p => P.push(p));
        P.sort((a,b) => a.pid - b.pid);
        parsedEvents.sort((a,b) => a.t - b.t);

        document.getElementById('btnStep').disabled  = false;
        document.getElementById('bp').disabled       = false;
        document.getElementById('btnReset').disabled = false;

        logs.push(`<strong style="color:var(--color-text-primary)">${parsedEvents.length} events loaded. ` +
                  `${P.length} processes. Sim time: ${maxTime}.</strong>`);
        resetSim();
    }

    // ──────────────────────────────────────────────── simulation control
    function resetSim() {
        if (timer) clearInterval(timer);
        playing = false; done = false;
        document.getElementById('bp').textContent = 'Play';
        time = 0; cpu = null; gantt = []; ioActive = []; logs = []; RQ = [];
        currentEventIndex = 0; ganttPage = 0; uspaceOffset = 0; rqOffset = 0;
        prevRQ = new Set(); prevCpu = null; prevIoActive = new Set(); prevArrived = new Set();
        P.forEach(p => {
            p.st = 0; p.cpub = 0; p.iob = 0; p.tc = p.tci;
            p.prio = 0; p.arrived = false; p.runStart = undefined; p.ioStart = undefined;
        });
        if (parsedEvents.length > 0 && parsedEvents[0].t === 0) processNextEvents();
        render();
    }

    function processNextEvents() {
        if (currentEventIndex >= parsedEvents.length) return;
        time = parsedEvents[currentEventIndex].t;

        while (currentEventIndex < parsedEvents.length &&
               parsedEvents[currentEventIndex].t === time) {
            const ev = parsedEvents[currentEventIndex];
            const rQ = new Set(RQ);

            if (ev.old === 'READY') {
                rQ.delete(ev.pid);
            }
            if (ev.old === 'RUNNG' && cpu === ev.pid) {
                cpu = null;
                const p = P.find(x => x.pid === ev.pid);
                if (p && p.runStart !== undefined) {
                    if (time > p.runStart) gantt.push({ pid:ev.pid, s:p.runStart, e:time, type:'cpu' });
                    p.runStart = undefined;
                }
                if (ev.nxt === 'BLOCK') {
                    if (p) p.ioStart = time;
                }
            }
            if (ev.old === 'BLOCK') {
                ioActive = ioActive.filter(id => id !== ev.pid);
                const p = P.find(x => x.pid === ev.pid);
                if (p && p.ioStart !== undefined) {
                    if (time > p.ioStart) gantt.push({ pid:ev.pid, s:p.ioStart, e:time, type:'io' });
                    p.ioStart = undefined;
                }
            }

            const p = P.find(x => x.pid === ev.pid);
            if (p) {
                if (ev.cb   !== undefined) p.cpub = ev.cb;
                if (ev.rem  !== undefined) p.tc   = ev.rem;
                if (ev.ib   !== undefined) p.iob  = ev.ib;
                if (ev.prio !== undefined) p.prio = ev.prio;
            }

            if (ev.nxt === 'READY') {
                rQ.add(ev.pid);
                if (p) { p.st = 1; if (ev.old === 'CREATED') p.arrived = true; }
            }
            if (ev.nxt === 'RUNNG') {
                cpu = ev.pid;
                if (p) { p.st = 2; p.runStart = time; }
            }
            if (ev.nxt === 'BLOCK') {
                ioActive.push(ev.pid);
                if (p) { p.st = 3; if (p.ioStart === undefined) p.ioStart = time; }
            }
            if (ev.nxt === 'Done') {
                if (cpu === ev.pid) {
                    cpu = null;
                    if (p && p.runStart !== undefined) {
                        gantt.push({ pid:ev.pid, s:p.runStart, e:time, type:'cpu' });
                        p.runStart = undefined;
                    }
                }
                rQ.delete(ev.pid);
                ioActive = ioActive.filter(id => id !== ev.pid);
                if (p) { p.st = 4; p.tc = 0; }
            }

            addLogEntry(ev);
            RQ = Array.from(rQ);
            currentEventIndex++;
        }
    }

    function stepForward() {
        if (done) return;
        if (currentEventIndex >= parsedEvents.length) {
            done = true;
            if (cpu !== null) {
                const p = P.find(x => x.pid === cpu);
                if (p && p.runStart !== undefined) {
                    gantt.push({ pid:cpu, s:p.runStart, e:maxTime, type:'cpu' });
                    p.runStart = undefined;
                }
            }
            time = maxTime;
            render();
            return;
        }
        processNextEvents();
        render();
    }

    function addLogEntry(ev) {
        const stateStr = ev.nxt === 'Done' ? 'Done' : `${ev.old} → ${ev.nxt}`;
        const col  = STATE_COLOR[ev.nxt] || '#64748b';
        let extras = '';
        if (ev.cb   !== undefined) extras += ` cb=${ev.cb}`;
        if (ev.rem  !== undefined) extras += ` rem=${ev.rem}`;
        if (ev.prio !== undefined) extras += ` prio=${ev.prio}`;
        if (ev.ib   !== undefined) extras += ` ib=${ev.ib}`;
        logs.push(
            `<span style="color:var(--s);min-width:32px;display:inline-block">${ev.t}</span> ` +
            `<span style="font-weight:700;color:${C[ev.pid % C.length]}">P${ev.pid}</span> ` +
            `<span style="color:${col};font-weight:600">${stateStr}</span>` +
            (extras ? `<span style="color:var(--t)">${extras}</span>` : '')
        );
    }

    function togglePlay() {
        playing = !playing;
        document.getElementById('bp').textContent = playing ? 'Pause' : 'Play';
        if (playing) {
            const delay = parseInt(document.getElementById('speed').value);
            timer = setInterval(() => {
                if (done || currentEventIndex >= parsedEvents.length) {
                    playing = false; clearInterval(timer);
                    document.getElementById('bp').textContent = 'Play'; return;
                }
                stepForward();
            }, delay);
        } else {
            clearInterval(timer);
        }
    }

    document.getElementById('speed').addEventListener('change', function () {
        if (playing) {
            clearInterval(timer);
            const delay = parseInt(this.value);
            timer = setInterval(() => {
                if (done || currentEventIndex >= parsedEvents.length) {
                    playing = false; clearInterval(timer);
                    document.getElementById('bp').textContent = 'Play'; return;
                }
                stepForward();
            }, delay);
        }
    });

    // ──────────────────────────────────────────────── render
    function render() {
        document.getElementById('clk').textContent = time;
        renderBuses();
        renderReadyQueue();
        renderUserSpace();
        renderCPU();
        renderIO();
        renderCompleted();
        renderStats();
        renderGantt();
        renderLog();
        prevRQ      = new Set(RQ);
        prevCpu     = cpu;
        prevIoActive= new Set(ioActive);
        prevArrived = new Set(P.filter(p => p.arrived).map(p => p.pid));
    }

    function renderBuses() {
        const active = (cpu !== null || RQ.length > 0);
        const dataColor = cpu !== null ? C[cpu % C.length] : '#1D9E75';
        ['sysbus','sysbus2'].forEach(id => {
            const el = document.getElementById(id);
            if (!el) return;
            el.style.opacity = active ? '.9' : '.35';
            el.style.stroke  = dataColor;
        });

        const ioBusEl = document.getElementById('iobus');
        if (ioBusEl) ioBusEl.style.opacity = ioActive.length ? '.9' : '.3';

        const irqEl = document.getElementById('irqbus');
        if (irqEl) irqEl.style.opacity =
            parsedEvents.some(e => e.t === time && e.nxt === 'READY') ? '.95' : '.3';
    }

    function renderReadyQueue() {
        let h = '';
        const MAX_CHIPS = 5;
        const hasLeft  = rqOffset > 0;
        const hasRight = rqOffset + MAX_CHIPS < RQ.length;
        const chipStartX = hasLeft ? 152 : 130;
        const visible = RQ.slice(rqOffset, rqOffset + MAX_CHIPS);
        visible.forEach((pid, i) => {
            h += chip(pid, chipStartX + i * 24, 108, 22, 20, !prevRQ.has(pid));
        });
        // ◄ arrow
        if (hasLeft) {
            h += `<rect x="128" y="106" width="18" height="16" rx="2" fill="#EEEDFE" style="cursor:pointer" onclick="rqNav(-1)"/>`;
            h += `<text x="137" y="117" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;cursor:pointer" fill="#3C3489" onclick="rqNav(-1)">◄</text>`;
        }
        // ► arrow
        if (hasRight) {
            h += `<rect x="272" y="106" width="18" height="16" rx="2" fill="#EEEDFE" style="cursor:pointer" onclick="rqNav(1)"/>`;
            h += `<text x="281" y="117" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;cursor:pointer" fill="#3C3489" onclick="rqNav(1)">►</text>`;
        }
        if (!RQ.length) {
            h += `<text x="200" y="121" text-anchor="middle" style="font-size:9px;" fill="var(--s)" opacity=".5">(Empty)</text>`;
        }
        document.getElementById('rq-content').innerHTML = h;
    }

    function renderUserSpace() {
        let h = '';
        const arrived = P.filter(p => p.arrived);
        const PAGE = 8;
        uspaceOffset = Math.min(uspaceOffset, Math.max(0, arrived.length - 1));
        const show = Math.min(arrived.length - uspaceOffset, PAGE);
        // ▲ arrow (up)
        if (uspaceOffset > 0) {
            h += `<rect x="264" y="153" width="16" height="14" rx="2" fill="#EEEDFE" style="cursor:pointer" onclick="uspaceNav(-1)"/>`;
            h += `<text x="272" y="162" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;cursor:pointer" fill="#0F6E56" onclick="uspaceNav(-1)">▲</text>`;
        }
        // ▼ arrow (down)
        if (uspaceOffset + PAGE < arrived.length) {
            h += `<rect x="264" y="307" width="16" height="14" rx="2" fill="#EEEDFE" style="cursor:pointer" onclick="uspaceNav(1)"/>`;
            h += `<text x="272" y="316" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:700;cursor:pointer" fill="#0F6E56" onclick="uspaceNav(1)">▼</text>`;
        }
        // User-space box: x=34, y=150, w=252 → inner area ends at x=286
        // 2 columns with 124px gap; each box is 116px wide → col0: x=42..158, col1: x=166..282 ✓
        arrived.slice(uspaceOffset, uspaceOffset + show).forEach((p, i) => {
            const row = Math.floor(i / 2), col = i % 2;
            const x = 42 + col * 124, y = 172 + row * 38;
            const ci = p.pid % C.length;

            let fill, stroke, opa;
            if (p.st === 4) {
                fill = '#f1f5f9'; stroke = 'var(--b)'; opa = '.5';
            } else if (p.st === 2) {
                fill = C[ci]; stroke = C[ci]; opa = '1';
            } else if (p.st === 3) {
                fill = CL[ci]; stroke = C[ci]; opa = '.7';
            } else {
                fill = CL[ci]; stroke = C[ci]; opa = '1';
            }
            const textFill = (p.st === 2) ? '#fff' : CT[ci];
            const BOX_W = 116;

            const isNew = !prevArrived.has(p.pid);
            h += `<rect x="${x}" y="${y}" width="${BOX_W}" height="32" rx="3" fill="${fill}" stroke="${stroke}" stroke-width=".7" opacity="${opa}"${isNew ? ' class="pchip"' : ''}"/>`;

            // PID label
            h += `<text x="${x+5}" y="${y+13}" style="font-size:11px;font-weight:700;font-family:var(--font-sans);" fill="${textFill}" opacity="${opa}">P${p.pid}</text>`;

            // State label (right-aligned inside box)
            const stLabels = ['created','ready','run','blocked','done'];
            const stLabel  = stLabels[p.st] || 'created';
            h += `<text x="${x+BOX_W-4}" y="${y+13}" text-anchor="end" style="font-size:9px;font-family:var(--font-mono);font-weight:bold;" fill="${textFill}" opacity="${parseFloat(opa)*.85}">${stLabel.toUpperCase()}</text>`;

            // Bottom row: burst info or progress bar
            if (p.st === 2 && p.cpub > 0) {
                h += `<text x="${x+5}" y="${y+26}" style="font-size:8.5px;font-family:var(--font-mono);" fill="${textFill}" opacity=".8">CPU Burst:${p.cpub} Rem:${Math.max(0,p.tc)}</text>`;
            } else if (p.st === 3 && p.iob > 0) {
                h += `<text x="${x+5}" y="${y+26}" style="font-size:8.5px;font-family:var(--font-mono);" fill="${CT[ci]}" opacity=".7">IO Burst:${p.iob} Rem:${Math.max(0,p.tc)}</text>`;
            } else {
                // progress bar fills left→right as work completes
                const frac = p.tci > 0 ? Math.max(0, 1 - p.tc / p.tci) : 0;
                const pw   = Math.round(frac * (BOX_W - 10));
                const barFill = (p.st === 4) ? 'var(--b)' : stroke;
                h += `<rect x="${x+5}" y="${y+24}" width="${BOX_W-10}" height="4" rx="1" fill="#e2e8f0"/>`;
                h += `<rect x="${x+5}" y="${y+24}" width="${pw}"        height="4" rx="1" fill="${barFill}" opacity="${opa}"/>`;
            }
        });
        if (arrived.length > PAGE) {
            const page = Math.floor(uspaceOffset / PAGE) + 1;
            const totalPages = Math.ceil(arrived.length / PAGE);
            h += `<text x="160" y="${172 + Math.ceil(show/2)*38 + 12}" text-anchor="middle" style="font-size:8.5px;" fill="var(--s)" opacity=".5">${page}/${totalPages}</text>`;
        }
        document.getElementById('uspace').innerHTML = h;
    }

    function renderCPU() {
        let cuH = '', aluH = '', regH = '', cacheH = '', pipeH = '', ctxH = '';
        const stages = ['Fetch','Decode','Execute','Writeback'];

        if (cpu !== null) {
            const p  = P.find(x => x.pid === cpu);
            const ci = cpu % C.length;
            document.getElementById('cu-box').classList.add('act');
            document.getElementById('alu-box').classList.add('act');

            cuH  = `<text x="450" y="108" text-anchor="middle" style="font-size:9px;font-family:var(--font-mono);font-weight:bold" fill="#185FA5">ACTIVE (RUNNING)</text>`;
            aluH = chip(cpu, 555, 90, 60, 22, cpu !== prevCpu);

            // Registers: box y=130..184, title at y=148; content at y=163 and y=176
            regH  = `<text x="395" y="165" style="font-size:10px;font-family:var(--font-mono);font-weight:600" fill="#444441">PC=${time}</text>`;
            regH += `<text x="445" y="165" style="font-size:10px;font-family:var(--font-mono);" fill="#444441">IR=Exec</text>`;
            regH += `<text x="395" y="178" style="font-size:10px;font-family:var(--font-mono);font-weight:600" fill="#444441">SP=P${cpu}</text>`;

            // L1 cache: box y=130..184, title at y=148; content at y=163
            const remFrac = (p && p.tci > 0) ? Math.max(0, 1 - p.tc / p.tci) : 0;
            const cacheW  = Math.round(100 * remFrac);
            cacheH  = `<text x="535" y="165" style="font-size:9px;font-family:var(--font-mono);" fill="#085041">P${cpu} data</text>`;
            cacheH += `<rect x="535" y="170" width="100" height="6" rx="2" fill="#9FE1CB" opacity=".5"/>`;
            cacheH += `<rect x="535" y="170" width="${cacheW}" height="6" rx="2" fill="#1D9E75" opacity=".9"/>`;

            // Pipeline stages inside box y=194..250; header text at y=211; stages at y=218
            stages.forEach((s, i) => {
                const sx     = 395 + i * 62;
                const active = (i >= 1 && i <= 2);
                pipeH += `<rect x="${sx}" y="218" width="54" height="24" rx="3" fill="${active ? C[ci] : 'var(--color-background-primary)'}" stroke="${active ? C[ci] : 'var(--b)'}" stroke-width=".5"/>`;
                pipeH += `<text x="${sx+27}" y="218" dy="14" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-weight:600;font-family:var(--font-sans);" fill="${active ? '#fff' : 'var(--s)'}">${s}</text>`;
                if (i < 3) pipeH += `<line x1="${sx+54}" y1="230" x2="${sx+62}" y2="230" stroke="var(--b)" stroke-width=".5" opacity=".3"/>`;
            });

            // Context box y=260..312; header at y=276; content at y=292+
            ctxH  = chip(cpu, 395, 284, 50, 22, cpu !== prevCpu);
            ctxH += `<text x="454" y="292" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">CPU Burst:<tspan style="fill:var(--color-text-primary);font-weight:700">${p ? p.cpub : 0}</tspan>  Priority:<tspan style="fill:#D85A30;font-weight:700">${p ? p.prio : 0}</tspan></text>`;
            ctxH += `<text x="454" y="305" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">Remaining:<tspan style="fill:var(--color-text-primary);font-weight:700">${p ? Math.max(0,p.tc) : 0}</tspan></text>`;
        } else {
            document.getElementById('cu-box').classList.remove('act');
            document.getElementById('alu-box').classList.remove('act');

            cuH   = `<text x="450" y="108" text-anchor="middle" style="font-size:9px;font-family:var(--font-mono);" fill="#185FA5" opacity=".5">Idle</text>`;
            regH  = `<text x="395" y="165" style="font-size:9px;font-family:var(--font-mono);" fill="#444441" opacity=".4">PC=—  IR=—  SP=—</text>`;
            cacheH= `<text x="535" y="165" style="font-size:9px;font-family:var(--font-mono);" fill="#085041" opacity=".4">Empty</text>`;
            ctxH  = `<text x="515" y="292" text-anchor="middle" style="font-size:9px;" fill="var(--s)" opacity=".4">no process loaded</text>`;

            stages.forEach((s, i) => {
                const sx = 395 + i * 62;
                pipeH += `<rect x="${sx}" y="218" width="54" height="24" rx="3" fill="var(--color-background-primary)" stroke="var(--b)" stroke-width=".5" opacity=".4"/>`;
                pipeH += `<text x="${sx+27}" y="218" dy="14" text-anchor="middle" dominant-baseline="central" style="font-size:9px;font-family:var(--font-sans);" fill="var(--s)" opacity=".4">${s}</text>`;
                if (i < 3) pipeH += `<line x1="${sx+54}" y1="230" x2="${sx+62}" y2="230" stroke="var(--b)" stroke-width=".5" opacity=".2"/>`;
            });
        }

        document.getElementById('cu-sched').innerHTML      = cuH;
        document.getElementById('alu-proc').innerHTML      = aluH;
        document.getElementById('regs').innerHTML          = regH;
        document.getElementById('cache-content').innerHTML = cacheH;
        document.getElementById('pipeline').innerHTML      = pipeH;
        document.getElementById('ctx').innerHTML           = ctxH;
    }

    function renderIO() {
        const dg  = document.getElementById('disk-g');
        let ioH   = '';
        if (ioActive.length) {
            dg.classList.add('dsk');
            dg.style.animationDuration = '1.8s';
            ioActive.slice(0, 4).forEach((pid, i) => {
                ioH += chip(pid, 130 + i * 38, 30, 34, 22, !prevIoActive.has(pid));
            });
            const bp      = P.find(x => x.pid === ioActive[0]);
            const ioBurst = bp && bp.iob > 0 ? bp.iob : '?';
            const procList = ioActive.map(id => 'P'+id).join(', ');
            const lbl = document.getElementById('io-label');
            lbl.style.fill = '#D85A30';
            lbl.innerHTML =
                `<tspan x="145" y="99" style="font-weight:700">Seeking: ${procList}</tspan>` +
                `<tspan x="145" y="109">IO Burst: ${ioBurst}</tspan>`;
        } else {
            dg.classList.add('dsk');
            dg.style.animationDuration = '4s';
            const lbl = document.getElementById('io-label');
            lbl.style.fill = 'var(--s)';
            lbl.innerHTML = `<tspan x="145" y="108">Idle Spindle</tspan>`;
        }
        document.getElementById('io-chips').innerHTML = ioH;
    }

    function renderCompleted() {
        let h = '';
        // Completed rect is now h=116; title at y=16; chips start at y=28, 6 per row, 22px row gap
        const doneProcs = P.filter(p => p.st === 4);
        doneProcs.forEach((p, i) => {
            const ci  = p.pid % C.length;
            const col = i % 6;
            const row = Math.floor(i / 6);
            const x   = 15 + col * 47;
            const y   = 28 + row * 26;
            h += `<rect x="${x}" y="${y}" width="43" height="20" rx="3" fill="${CL[ci]}" stroke="${C[ci]}" stroke-width=".5"/>`;
            h += `<text x="${x+21}" y="${y+10}" text-anchor="middle" dominant-baseline="central" fill="${CT[ci]}" style="font-size:11px;font-weight:700;font-family:var(--font-sans)">P${p.pid}</text>`;
        });
        document.getElementById('done-c').innerHTML = h;
    }

    function renderStats() {
        const doneCnt = P.filter(p => p.st === 4).length;
        const total   = P.length;
        let h = '';

        const algoDisplay = algoFull || currentAlgo;
        h += `<text x="10" y="17" style="font-size:10px;font-family:var(--font-mono);font-weight:700;" fill="#534AB7">${algoDisplay}</text>`;
        h += `<text x="116" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">Done: <tspan font-weight="700" fill="var(--color-text-primary)">${doneCnt}/${total}</tspan></text>`;

        if (summaryStats && done) {
            h += `<text x="216" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">CPU: <tspan font-weight="700" fill="#1D9E75">${summaryStats.cpuUtil.toFixed(1)}%</tspan></text>`;
            h += `<text x="290" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">IO: <tspan font-weight="700" fill="#D85A30">${summaryStats.ioUtil.toFixed(1)}%</tspan></text>`;
            h += `<text x="358" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">avgTAT: <tspan font-weight="700" fill="var(--color-text-primary)">${summaryStats.avgTAT.toFixed(1)}</tspan></text>`;
            h += `<text x="452" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">avgWait: <tspan font-weight="700" fill="var(--color-text-primary)">${summaryStats.avgWait.toFixed(1)}</tspan></text>`;
            h += `<text x="548" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">tput: <tspan font-weight="700" fill="var(--color-text-primary)">${summaryStats.throughput.toFixed(3)}</tspan></text>`;
        } else {
            const cpuTicks = gantt.filter(g => g.type === 'cpu').reduce((s,g) => s + (g.e - g.s), 0);
            const ioTicks  = gantt.filter(g => g.type === 'io' ).reduce((s,g) => s + (g.e - g.s), 0);
            const elapsed  = time || 1;
            h += `<text x="216" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">CPU≈<tspan font-weight="700" fill="#1D9E75">${(100*cpuTicks/elapsed).toFixed(0)}%</tspan></text>`;
            h += `<text x="290" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)">IO≈<tspan font-weight="700" fill="#D85A30">${(100*ioTicks/elapsed).toFixed(0)}%</tspan></text>`;
            h += `<text x="548" y="17" style="font-size:10px;font-family:var(--font-mono);" fill="var(--s)" opacity=".5">t=${time} / ${maxTime}</text>`;
        }
        document.getElementById('stats-bar').innerHTML = h;
    }

    function renderGantt() {
        const scale  = Math.max(maxTime, 1);
        const LABEL  = 32;   // px for process labels
        const W      = 628;  // total chart width (matches stats bar w=640 minus left margin)
        const CW     = W - LABEL;
        const ROW_H  = 15;
        const ROW_G  = 4;
        const MAX_ROWS = 8;

        const maxPage = Math.max(0, Math.ceil(P.length / MAX_ROWS) - 1);
        ganttPage = Math.min(ganttPage, maxPage);
        const startIdx = ganttPage * MAX_ROWS;
        const pids = P.slice(startIdx, startIdx + MAX_ROWS).map(p => p.pid);
        let h = '';

        // current live CPU run (not yet committed to gantt array)
        const gAll = [...gantt];
        if (cpu !== null) {
            const p = P.find(x => x.pid === cpu);
            if (p && p.runStart !== undefined) {
                gAll.push({ pid:cpu, s:p.runStart, e:time, type:'cpu' });
            }
        }

        // rows
        pids.forEach((pid, ri) => {
            const y  = 20 + ri * (ROW_H + ROW_G);
            const ci = pid % C.length;

            // row background stripe
            h += `<rect x="${LABEL}" y="${y}" width="${CW}" height="${ROW_H}" rx="1" fill="${ri%2===0 ? '#f8fafc' : '#fff'}" stroke="var(--b)" stroke-width=".3"/>`;
            // PID label (right-aligned, vertically centred in row)
            h += `<text x="${LABEL-4}" y="${y + ROW_H/2}" text-anchor="end" dominant-baseline="central" style="font-size:9px;font-weight:700;font-family:var(--font-sans);" fill="${C[ci]}">P${pid}</text>`;

            gAll.filter(g => g.pid === pid).forEach(g => {
                const l = LABEL + (g.s / scale) * CW;
                const w = Math.max((g.e - g.s) / scale * CW, 0.5);
                if (g.type === 'cpu') {
                    h += `<rect x="${l}" y="${y+1}" width="${w}" height="${ROW_H-2}" rx="1" fill="${C[ci]}" opacity=".9"/>`;
                    if (w > 14) h += `<text x="${l+w/2}" y="${y+ROW_H/2}" text-anchor="middle" dominant-baseline="central" fill="#fff" style="font-size:7px;font-weight:700;font-family:var(--font-sans)">P${pid}</text>`;
                } else {
                    h += `<rect x="${l}" y="${y+3}" width="${w}" height="${ROW_H-6}" rx="1" fill="${C[ci]}" opacity=".28"/>`;
                }
            });
        });

        // navigation pill — centered below rows
        if (P.length > MAX_ROWS) {
            const navY = 20 + pids.length * (ROW_H + ROW_G) + 6;
            const pillW = 84, pillH = 16, pillX = LABEL + (CW - pillW) / 2;
            h += `<rect x="${pillX}" y="${navY}" width="${pillW}" height="${pillH}" rx="8" fill="var(--bg2)" stroke="var(--b)" stroke-width=".7"/>`;
            // ◄
            const canPrev = ganttPage > 0;
            h += `<text x="${pillX+12}" y="${navY+8}" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;cursor:${canPrev?'pointer':'default'}" fill="${canPrev?'var(--s)':'var(--b)'}" onclick="${canPrev?'ganttNav(-1)':''}">◄</text>`;
            // page label
            h += `<text x="${pillX+pillW/2}" y="${navY+8}" text-anchor="middle" dominant-baseline="central" style="font-size:8.5px;font-family:var(--font-mono);" fill="var(--s)">${ganttPage+1} / ${maxPage+1}</text>`;
            // ►
            const canNext = ganttPage < maxPage;
            h += `<text x="${pillX+pillW-12}" y="${navY+8}" text-anchor="middle" dominant-baseline="central" style="font-size:10px;font-weight:700;cursor:${canNext?'pointer':'default'}" fill="${canNext?'var(--s)':'var(--b)'}" onclick="${canNext?'ganttNav(1)':''}">►</text>`;
        }

        // time axis
        const axisY = 20 + pids.length * (ROW_H + ROW_G) + 16;
        for (let i = 0; i <= 5; i++) {
            const t = Math.round(scale / 5 * i);
            const x = LABEL + (t / scale) * CW;
            h += `<line x1="${x}" y1="18" x2="${x}" y2="${axisY - 4}" stroke="var(--b)" stroke-width=".5" stroke-dasharray="2 2" opacity=".5"/>`;
            h += `<text x="${x}" y="${axisY}" text-anchor="middle" style="font-size:8.5px;font-weight:600;" fill="var(--s)" opacity=".7">${t}</text>`;
        }

        // legend
        const lx = LABEL + CW - 120;
        const ly = axisY + 14;
        h += `<rect x="${lx}"    y="${ly}"   width="10" height="6" rx="1" fill="#7F77DD" opacity=".9"/>`;
        h += `<text x="${lx+14}" y="${ly+6}" style="font-size:8px;font-family:var(--font-sans);" fill="var(--s)">CPU Burst</text>`;
        h += `<rect x="${lx+68}"    y="${ly+1}" width="10" height="4" rx="1" fill="#7F77DD" opacity=".28"/>`;
        h += `<text x="${lx+82}" y="${ly+6}" style="font-size:8px;font-family:var(--font-sans);" fill="var(--s)">I/O Wait</text>`;

        document.getElementById('gantt').innerHTML = h;
    }

    function renderLog() {
        const logEl = document.getElementById('log');
        logEl.innerHTML = logs.slice(-20).map(l => `<div style="padding:1px 0">${l}</div>`).join('');
        logEl.scrollTop = logEl.scrollHeight;
    }
</script>
</body>
</html>
